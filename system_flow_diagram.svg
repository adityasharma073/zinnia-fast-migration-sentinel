<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1400 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Define styles -->
  <defs>
    <style>
      .box { fill: #1e293b; stroke: #3b82f6; stroke-width: 2; }
      .box-active { fill: #0f172a; stroke: #60a5fa; stroke-width: 2; }
      .text { fill: #e2e8f0; font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
      .label { fill: #cbd5e1; font-family: Arial, sans-serif; font-size: 12px; }
      .arrow { stroke: #3b82f6; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-label { fill: #60a5fa; font-family: Arial, sans-serif; font-size: 11px; font-weight: bold; }
      .title { fill: #fff; font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; }
      .section-title { fill: #60a5fa; font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3b82f6" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="1000" fill="#0f172a"/>

  <!-- Title -->
  <text x="700" y="35" class="title" text-anchor="middle">Zinniovate - Document Reconciliation Pipeline</text>

  <!-- Section 1: Upload and API -->
  <text x="50" y="70" class="section-title">1. BROWSER and FILE UPLOAD</text>
  <rect x="50" y="90" width="200" height="80" class="box" rx="5"/>
  <text x="150" y="115" class="text" text-anchor="middle">Browser</text>
  <text x="150" y="135" class="label" text-anchor="middle">Upload PDFs</text>
  <text x="150" y="155" class="label" text-anchor="middle">http://localhost:3000</text>

  <!-- Arrow to Node.js -->
  <path d="M 250 130 L 320 130" class="arrow"/>
  <text x="280" y="120" class="arrow-label">POST</text>

  <!-- Section 2: Node.js Server -->
  <text x="320" y="70" class="section-title">2. NODE.JS SERVER</text>
  <rect x="320" y="90" width="220" height="80" class="box-active" rx="5"/>
  <text x="430" y="115" class="text" text-anchor="middle">Node.js Server</text>
  <text x="430" y="135" class="label" text-anchor="middle">Multer: Save Files</text>
  <text x="430" y="155" class="label" text-anchor="middle">Generate JobID</text>

  <!-- Arrow to Kafka -->
  <path d="M 540 130 L 610 130" class="arrow"/>
  <text x="570" y="120" class="arrow-label">Push Job</text>

  <!-- Section 3: Kafka -->
  <text x="610" y="70" class="section-title">3. APACHE KAFKA</text>
  <rect x="610" y="90" width="200" height="80" class="box" rx="5"/>
  <text x="710" y="115" class="text" text-anchor="middle">Kafka Broker</text>
  <text x="710" y="135" class="label" text-anchor="middle">Topic:</text>
  <text x="710" y="155" class="label" text-anchor="middle">policy-timeline-jobs</text>

  <!-- Arrow to Python Worker -->
  <path d="M 810 130 L 880 130" class="arrow"/>
  <text x="840" y="120" class="arrow-label">Poll</text>

  <!-- Section 4: Python Worker -->
  <text x="880" y="70" class="section-title">4. PYTHON WORKER</text>
  <rect x="880" y="90" width="220" height="80" class="box" rx="5"/>
  <text x="990" y="115" class="text" text-anchor="middle">Python Worker</text>
  <text x="990" y="135" class="label" text-anchor="middle">Extract and Analyze</text>
  <text x="990" y="155" class="label" text-anchor="middle">Generate Report</text>

  <!-- Arrow back to Node.js for report retrieval -->
  <path d="M 990 170 L 990 250" class="arrow"/>
  <text x="1000" y="215" class="arrow-label">Save Report</text>

  <!-- Down arrow from Node.js -->
  <path d="M 430 170 L 430 250" class="arrow"/>
  <text x="440" y="215" class="arrow-label">Query Report</text>

  <!-- Section 5: File Storage -->
  <text x="50" y="290" class="section-title">5. FILE STORAGE</text>
  
  <!-- Uploads folder -->
  <rect x="50" y="310" width="180" height="100" class="box" rx="5"/>
  <text x="140" y="335" class="text" text-anchor="middle">Uploads/</text>
  <text x="140" y="355" class="label" text-anchor="middle">1774867_sample.pdf</text>
  <text x="140" y="375" class="label" text-anchor="middle">1774868_data.xml</text>
  <text x="140" y="395" class="label" text-anchor="middle">1774869_report.pdf</text>

  <!-- Reports folder -->
  <rect x="270" y="310" width="180" height="100" class="box" rx="5"/>
  <text x="360" y="335" class="text" text-anchor="middle">Reports/</text>
  <text x="360" y="355" class="label" text-anchor="middle">report_3715587e</text>
  <text x="360" y="375" class="label" text-anchor="middle">.json</text>
  <text x="360" y="395" class="label" text-anchor="middle">(Anomalies)</text>

  <!-- Section 6: Data Extraction -->
  <text x="490" y="290" class="section-title">6. DATA EXTRACTION</text>
  
  <!-- PDF Content -->
  <rect x="490" y="310" width="180" height="100" class="box" rx="5"/>
  <text x="580" y="335" class="text" text-anchor="middle">PDF Content</text>
  <text x="580" y="355" class="label" text-anchor="middle">Contract: 551000005</text>
  <text x="580" y="375" class="label" text-anchor="middle">Value: $192,030.98</text>
  <text x="580" y="395" class="label" text-anchor="middle">Benefit: $192,030.98</text>

  <!-- XML Content -->
  <rect x="710" y="310" width="180" height="100" class="box" rx="5"/>
  <text x="800" y="335" class="text" text-anchor="middle">XML Content</text>
  <text x="800" y="355" class="label" text-anchor="middle">Policy: POL-98765</text>
  <text x="800" y="375" class="label" text-anchor="middle">Premium: $1,200</text>
  <text x="800" y="395" class="label" text-anchor="middle">Benefit: $400,000</text>

  <!-- Section 7: AI Analysis -->
  <text x="930" y="290" class="section-title">7. AI ANALYSIS</text>
  <rect x="930" y="310" width="180" height="100" class="box" rx="5"/>
  <text x="1020" y="335" class="text" text-anchor="middle">GPT-4 Analysis</text>
  <text x="1020" y="355" class="label" text-anchor="middle">Find Anomalies:</text>
  <text x="1020" y="375" class="label" text-anchor="middle">Death Benefit Drop</text>
  <text x="1020" y="395" class="label" text-anchor="middle">Fee Spike</text>

  <!-- Section 8: Results -->
  <text x="1150" y="290" class="section-title">8. RESULTS</text>
  <rect x="1150" y="310" width="200" height="100" class="box" rx="5"/>
  <text x="1250" y="335" class="text" text-anchor="middle">Browser UI</text>
  <text x="1250" y="355" class="label" text-anchor="middle">Job ID: 3715587e</text>
  <text x="1250" y="375" class="label" text-anchor="middle">Status: CRITICAL</text>
  <text x="1250" y="395" class="label" text-anchor="middle">Anomalies: 3</text>

  <!-- Bottom flow section -->
  <line x1="50" y1="480" x2="1350" y2="480" stroke="#475569" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- Detailed Process Flow -->
  <text x="700" y="530" class="title" text-anchor="middle">Detailed Process Flow</text>

  <!-- Step 1 -->
  <circle cx="100" cy="600" r="25" fill="#3b82f6" stroke="#60a5fa" stroke-width="2"/>
  <text x="100" y="607" class="text" text-anchor="middle" font-size="16">1</text>
  <text x="100" y="650" class="label" text-anchor="middle">Upload PDFs</text>
  <text x="100" y="670" class="label" text-anchor="middle">via Browser</text>

  <!-- Arrow -->
  <path d="M 130 600 L 200 600" class="arrow"/>

  <!-- Step 2 -->
  <circle cx="250" cy="600" r="25" fill="#3b82f6" stroke="#60a5fa" stroke-width="2"/>
  <text x="250" y="607" class="text" text-anchor="middle" font-size="16">2</text>
  <text x="250" y="650" class="label" text-anchor="middle">Multer Saves</text>
  <text x="250" y="670" class="label" text-anchor="middle">Files</text>

  <!-- Arrow -->
  <path d="M 280 600 L 350 600" class="arrow"/>

  <!-- Step 3 -->
  <circle cx="400" cy="600" r="25" fill="#3b82f6" stroke="#60a5fa" stroke-width="2"/>
  <text x="400" y="607" class="text" text-anchor="middle" font-size="16">3</text>
  <text x="400" y="650" class="label" text-anchor="middle">Generate</text>
  <text x="400" y="670" class="label" text-anchor="middle">JobID</text>

  <!-- Arrow -->
  <path d="M 430 600 L 500 600" class="arrow"/>

  <!-- Step 4 -->
  <circle cx="550" cy="600" r="25" fill="#3b82f6" stroke="#60a5fa" stroke-width="2"/>
  <text x="550" y="607" class="text" text-anchor="middle" font-size="16">4</text>
  <text x="550" y="650" class="label" text-anchor="middle">Push to</text>
  <text x="550" y="670" class="label" text-anchor="middle">Kafka</text>

  <!-- Arrow -->
  <path d="M 580 600 L 650 600" class="arrow"/>

  <!-- Step 5 -->
  <circle cx="700" cy="600" r="25" fill="#3b82f6" stroke="#60a5fa" stroke-width="2"/>
  <text x="700" y="607" class="text" text-anchor="middle" font-size="16">5</text>
  <text x="700" y="650" class="label" text-anchor="middle">Worker</text>
  <text x="700" y="670" class="label" text-anchor="middle">Polls Job</text>

  <!-- Arrow -->
  <path d="M 730 600 L 800 600" class="arrow"/>

  <!-- Step 6 -->
  <circle cx="850" cy="600" r="25" fill="#3b82f6" stroke="#60a5fa" stroke-width="2"/>
  <text x="850" y="607" class="text" text-anchor="middle" font-size="16">6</text>
  <text x="850" y="650" class="label" text-anchor="middle">Extract</text>
  <text x="850" y="670" class="label" text-anchor="middle">Data</text>

  <!-- Arrow -->
  <path d="M 880 600 L 950 600" class="arrow"/>

  <!-- Step 7 -->
  <circle cx="1000" cy="600" r="25" fill="#3b82f6" stroke="#60a5fa" stroke-width="2"/>
  <text x="1000" y="607" class="text" text-anchor="middle" font-size="16">7</text>
  <text x="1000" y="650" class="label" text-anchor="middle">Send to</text>
  <text x="1000" y="670" class="label" text-anchor="middle">AI/Mock</text>

  <!-- Arrow -->
  <path d="M 1030 600 L 1100 600" class="arrow"/>

  <!-- Step 8 -->
  <circle cx="1150" cy="600" r="25" fill="#3b82f6" stroke="#60a5fa" stroke-width="2"/>
  <text x="1150" y="607" class="text" text-anchor="middle" font-size="16">8</text>
  <text x="1150" y="650" class="label" text-anchor="middle">Save</text>
  <text x="1150" y="670" class="label" text-anchor="middle">Report</text>

  <!-- Bottom legend -->
  <text x="50" y="800" class="section-title">Key Components:</text>
  
  <rect x="50" y="820" width="15" height="15" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="75" y="832" class="label">Service/Component</text>

  <rect x="350" y="820" width="15" height="15" fill="#0f172a" stroke="#60a5fa" stroke-width="2"/>
  <text x="375" y="832" class="label">Active Processing</text>

  <line x1="650" y1="827" x2="665" y2="827" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="675" y="832" class="label">Data Flow</text>

  <!-- Footer -->
  <text x="700" y="920" class="label" text-anchor="middle">Upload to Extract to Queue to Process to Analyze to Report</text>
  <text x="700" y="950" class="label" text-anchor="middle">JobID tracks entire journey from upload to final report</text>
</svg>
